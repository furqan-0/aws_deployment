name: build-and-deploy-backend

# triggers : define when this workflow should run
on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  build-and-lint:
    runs-on: ubuntu-latest
    steps:
      # Checkout repo
      - name: Checkout repo
        uses: actions/checkout@v3

      # Setup Node
      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 20

      # Install backend dependencies
      - name: Install backend dependencies
        run: npm ci

      # Lint backend
      - name: Lint backend
        run: npm run lint -- --max-warnings=0

  deploy:
    needs: build-and-lint
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    environment: ec2-backend
    env:
      EC2_HOST: ${{ secrets.EC2_HOST }}
      EC2_USER: ${{ secrets.EC2_USER }}
      EC2_APP_DIR: ${{ secrets.EC2_APP_DIR }}
    steps:
      - name: Add EC2 host to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H "$EC2_HOST" >> ~/.ssh/known_hosts

      - name: Write SSH private key
        run: |
          echo "${{ secrets.EC2_KEY }}" > ec2_key.pem
          chmod 600 ec2_key.pem

      - name: Deploy backend on EC2
        run: |
          KEY="ec2_key.pem"
          ssh -i "$KEY" -o StrictHostKeyChecking=yes "$EC2_USER@$EC2_HOST" << EOF
            set -euo pipefail
            cd "$EC2_APP_DIR" || exit 1

            # Pull latest code
            git fetch --all
            git reset --hard origin/main

            # Install dependencies
            npm ci

            # Restart backend using PM2
            pm2 restart todo-backend || pm2 start src/server.js --name todo-backend

            # Optional: clean npm cache
            npm cache clean --force
          EOF